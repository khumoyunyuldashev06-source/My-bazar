<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Закупка на базаре</title>
<style>
  :root {
    --bg:#f4f1ea; --bg2:#ece7dc; --card:#ffffff; --line:#e6e0d3;
    --ink:#2b2520; --muted:#9b9183; --accent:#c8541e; --accent-d:#a8410f;
    --green:#3f8f5b; --red:#c0392b; --soft:#fbeee4; --blue:#2f6fb0;
    --shadow:0 1px 2px rgba(43,37,32,.05),0 8px 24px rgba(43,37,32,.06);
  }
  * { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
  body { font-family:-apple-system,"SF Pro Text",system-ui,"Segoe UI",sans-serif; background:var(--bg); color:var(--ink); min-height:100vh; padding:18px 18px 110px; max-width:560px; margin:0 auto; }
  header { margin-bottom:16px; }
  .title-row { display:flex; align-items:center; gap:10px; }
  .basket { width:42px; height:42px; flex-shrink:0; border-radius:13px; background:linear-gradient(145deg,#c8541e,#e07b3a); display:flex; align-items:center; justify-content:center; font-size:22px; box-shadow:0 4px 12px rgba(200,84,30,.28); }
  h1 { font-size:23px; font-weight:800; letter-spacing:-0.6px; line-height:1.05; }
  .date { font-size:13px; color:var(--muted); font-weight:600; }

  .tabs { display:flex; gap:4px; background:var(--bg2); border-radius:14px; padding:4px; margin:16px 0; box-shadow:inset 0 1px 2px rgba(43,37,32,.04); }
  .tabs button { flex:1; background:transparent; border:none; color:var(--muted); font-size:12px; font-weight:700; padding:10px 2px; border-radius:10px; cursor:pointer; transition:.18s; font-family:inherit; }
  .tabs button.active { background:var(--card); color:var(--ink); box-shadow:var(--shadow); }

  .total-card { background:linear-gradient(160deg,#2b2520,#3a322a); color:#fff; border-radius:22px; padding:22px 24px; margin-bottom:18px; box-shadow:0 12px 32px rgba(43,37,32,.22); position:relative; overflow:hidden; }
  .total-card::after { content:""; position:absolute; top:-40px; right:-30px; width:160px; height:160px; background:radial-gradient(circle,rgba(200,84,30,.35),transparent 70%); pointer-events:none; }
  .total-label { font-size:12px; color:#b8ab98; text-transform:uppercase; letter-spacing:1.5px; font-weight:700; }
  .total-value { font-size:40px; font-weight:800; margin-top:4px; letter-spacing:-1px; color:#fff; }
  .total-value small { font-size:19px; font-weight:600; color:#d8a06f; margin-left:3px; }
  .total-meta { font-size:13px; color:#b8ab98; margin-top:6px; font-weight:500; }
  .compare { margin-top:10px; font-size:13px; font-weight:700; display:inline-flex; align-items:center; gap:6px; padding:6px 12px; border-radius:20px; background:rgba(255,255,255,.1); }
  .compare.up { color:#ff9b85; } .compare.down { color:#86d99e; } .compare.same { color:#b8ab98; }
  .save-bazar { margin-top:14px; width:100%; background:rgba(255,255,255,.14); color:#fff; border:none; border-radius:12px; padding:12px; font-size:14px; font-weight:700; cursor:pointer; font-family:inherit; transition:.15s; }
  .save-bazar:active { background:rgba(255,255,255,.26); }

  .panel { display:none; }
  .panel.active { display:block; animation:fade .25s ease; }
  @keyframes fade { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:none} }

  .add-form { background:var(--card); border-radius:18px; padding:16px; margin-bottom:16px; box-shadow:var(--shadow); }
  .field-label { font-size:12px; color:var(--muted); font-weight:700; margin:0 0 5px 3px; }
  .add-form input, .add-form select { width:100%; background:var(--bg); border:1.5px solid transparent; border-radius:12px; color:var(--ink); font-size:16px; padding:13px 15px; margin-bottom:11px; outline:none; font-family:inherit; transition:.15s; }
  .add-form input::placeholder { color:#bdb3a3; }
  .add-form input:focus, .add-form select:focus { border-color:var(--accent); background:#fff; }
  .row2 { display:flex; gap:10px; }
  .row2 > div { flex:1; }
  .row2 input { margin-bottom:0; }
  button.add { width:100%; background:var(--accent); color:#fff; border:none; border-radius:13px; font-size:16px; font-weight:800; padding:15px; margin-top:13px; cursor:pointer; font-family:inherit; box-shadow:0 6px 16px rgba(200,84,30,.3); transition:.15s; }
  button.add:active { transform:scale(.98); background:var(--accent-d); }
  button.add.editing { background:var(--blue); box-shadow:0 6px 16px rgba(47,111,176,.3); }
  .cancel-edit { width:100%; background:transparent; border:none; color:var(--muted); font-size:14px; font-weight:700; padding:10px; margin-top:6px; cursor:pointer; font-family:inherit; }

  .cat-group-label { font-size:13px; font-weight:800; color:var(--muted); text-transform:uppercase; letter-spacing:.8px; margin:18px 3px 9px; display:flex; align-items:center; gap:7px; }
  .cat-group-label:first-of-type { margin-top:4px; }
  .cat-group-label .dot { width:8px; height:8px; border-radius:50%; }

  .list { display:flex; flex-direction:column; gap:10px; }
  .cat-item { background:var(--card); border-radius:16px; padding:15px 16px; display:flex; align-items:center; gap:10px; box-shadow:var(--shadow); }
  .search-box { display:flex; align-items:center; gap:8px; background:var(--card); border-radius:14px; padding:4px 6px 4px 14px; margin-bottom:6px; box-shadow:var(--shadow); }
  .search-ic { font-size:15px; opacity:.6; }
  .search-box input { flex:1; border:none; background:transparent; outline:none; font-size:16px; font-family:inherit; color:var(--ink); padding:11px 4px; }
  .search-box input::placeholder { color:#bdb3a3; }
  .search-clear { border:none; background:var(--bg2); color:var(--muted); width:32px; height:32px; border-radius:9px; font-size:18px; cursor:pointer; flex-shrink:0; }
  .hist-btn { background:#f4ede2; color:#8a6d3b; }
  .pricehist-list { display:flex; flex-direction:column; gap:0; }
  .ph-row { display:flex; align-items:center; gap:10px; font-size:14px; padding:11px 2px; border-bottom:1px solid var(--line); }
  .ph-row:last-child { border-bottom:none; }
  .ph-date { color:var(--muted); font-weight:600; font-size:13px; min-width:74px; }
  .ph-price { font-weight:800; }
  .ph-diff { margin-left:auto; font-size:12px; font-weight:700; padding:3px 9px; border-radius:20px; }
  .ph-diff.up { background:#fde8e4; color:var(--red); }
  .ph-diff.down { background:#e3f3e8; color:var(--green); }
  .ph-diff.same { background:var(--bg2); color:var(--muted); }
  .cat-info { flex:1; min-width:0; }
  .cat-name { font-size:16px; font-weight:700; }
  .cat-price { font-size:13px; color:var(--muted); margin-top:3px; font-weight:600; }
  .icon-btn { border:none; width:36px; height:36px; border-radius:11px; font-size:17px; cursor:pointer; flex-shrink:0; transition:.12s; }
  .icon-btn:active { transform:scale(.88); }
  .edit-btn { background:#eef3f8; color:var(--blue); }
  .del-btn { background:var(--soft); color:var(--red); }

  .buy-item { background:var(--card); border-radius:16px; padding:14px 16px; display:flex; align-items:center; gap:12px; box-shadow:var(--shadow); border:1.5px solid transparent; transition:.18s; }
  .buy-item.has { border-color:var(--accent); background:#fffdf9; }
  .buy-info { flex:1; min-width:0; }
  .buy-name { font-size:16px; font-weight:700; }
  .buy-price { font-size:13px; color:var(--muted); margin-top:3px; font-weight:600; display:inline-flex; align-items:center; gap:5px; cursor:pointer; }
  .buy-price .pen { opacity:.5; font-size:11px; }
  .price-edit { display:flex; align-items:center; gap:6px; margin-top:4px; }
  .price-edit input { width:90px; background:#fff; border:1.5px solid var(--accent); border-radius:9px; padding:6px 9px; font-size:14px; font-weight:700; font-family:inherit; outline:none; color:var(--ink); }
  .price-edit button { border:none; background:var(--accent); color:#fff; border-radius:9px; padding:6px 11px; font-size:13px; font-weight:700; font-family:inherit; cursor:pointer; }
  .buy-sum { font-size:14px; color:var(--accent); font-weight:800; margin-top:4px; }
  .stepper { display:flex; align-items:center; gap:8px; flex-shrink:0; }
  .stepper button { width:38px; height:38px; border-radius:12px; border:none; background:var(--bg2); color:var(--ink); font-size:22px; font-weight:700; cursor:pointer; line-height:0; transition:.12s; }
  .stepper button:active { transform:scale(.88); background:var(--accent); color:#fff; }
  .stepper input { width:50px; text-align:center; background:var(--bg); border:1.5px solid transparent; border-radius:11px; color:var(--ink); font-size:17px; font-weight:800; padding:9px 2px; outline:none; font-family:inherit; }
  .stepper input:focus { border-color:var(--accent); background:#fff; }

  .empty { text-align:center; color:var(--muted); padding:48px 24px; font-size:15px; line-height:1.6; font-weight:500; }
  .actions { display:flex; gap:10px; margin-top:18px; }
  .actions button { flex:1; background:var(--card); border:none; color:var(--ink); border-radius:13px; padding:13px; font-size:14px; font-weight:700; cursor:pointer; font-family:inherit; box-shadow:var(--shadow); transition:.12s; }
  .actions button:active { transform:scale(.98); }
  .clear { color:var(--red) !important; }

  /* История + аналитика */
  .hist-total { background:linear-gradient(160deg,#2b2520,#3a322a); color:#fff; border-radius:18px; padding:18px 20px; margin-bottom:14px; }
  .hist-total .l { font-size:12px; color:#b8ab98; text-transform:uppercase; letter-spacing:1px; font-weight:700; }
  .hist-total .v { font-size:28px; font-weight:800; margin-top:3px; }
  .hist-total .sub { font-size:13px; color:#b8ab98; margin-top:4px; font-weight:500; }
  .donut-area { display:flex; align-items:center; gap:18px; margin-top:16px; }
  .donut { width:96px; height:96px; flex-shrink:0; border-radius:50%; position:relative; }
  .donut::after { content:""; position:absolute; inset:16px; background:#312922; border-radius:50%; }
  .donut-legend { flex:1; display:flex; flex-direction:column; gap:9px; }
  .leg-row { display:flex; align-items:center; gap:8px; font-size:13px; }
  .leg-dot { width:10px; height:10px; border-radius:3px; flex-shrink:0; }
  .leg-name { color:#d8cfc0; font-weight:600; }
  .leg-val { margin-left:auto; font-weight:800; color:#fff; }
  .leg-pct { color:#b8ab98; font-weight:600; font-size:12px; margin-left:6px; }
  .analytics { background:var(--card); border-radius:18px; padding:18px; margin-bottom:14px; box-shadow:var(--shadow); }
  .analytics h4 { font-size:13px; font-weight:800; color:var(--muted); text-transform:uppercase; letter-spacing:.8px; margin-bottom:14px; }
  .bar-row { margin-bottom:13px; }
  .bar-row:last-child { margin-bottom:0; }
  .bar-head { display:flex; justify-content:space-between; align-items:baseline; margin-bottom:5px; }
  .bar-name { font-size:14px; font-weight:700; display:flex; align-items:center; gap:6px; }
  .bar-val { font-size:14px; font-weight:800; }
  .bar-pct { font-size:12px; color:var(--muted); font-weight:600; margin-left:5px; }
  .bar-track { height:9px; background:var(--bg2); border-radius:6px; overflow:hidden; }
  .bar-fill { height:100%; border-radius:6px; transition:width .5s ease; }
  .mini-chart { display:flex; align-items:flex-end; gap:6px; height:90px; margin-top:6px; }
  .mc-bar { flex:1; background:linear-gradient(180deg,#e07b3a,#c8541e); border-radius:6px 6px 0 0; min-height:4px; position:relative; transition:height .5s ease; }
  .mc-label { font-size:10px; color:var(--muted); text-align:center; margin-top:5px; font-weight:600; }
  .chart-wrap { display:flex; gap:6px; }
  .chart-col { flex:1; display:flex; flex-direction:column; justify-content:flex-end; }

  .hist-item { background:var(--card); border-radius:16px; padding:15px 16px; box-shadow:var(--shadow); display:flex; align-items:center; gap:12px; cursor:pointer; }
  .hist-date-box { width:52px; height:52px; flex-shrink:0; border-radius:13px; background:var(--soft); display:flex; flex-direction:column; align-items:center; justify-content:center; }
  .hist-day { font-size:20px; font-weight:800; color:var(--accent); line-height:1; }
  .hist-mon { font-size:11px; font-weight:700; color:var(--muted); text-transform:uppercase; margin-top:2px; }
  .hist-info { flex:1; min-width:0; }
  .hist-sum { font-size:18px; font-weight:800; }
  .hist-cnt { font-size:13px; color:var(--muted); font-weight:600; margin-top:2px; display:flex; align-items:center; gap:6px; }
  .hist-chev { font-size:12px; color:var(--muted); transition:.2s; }
  .hist-wrap.open .hist-chev { transform:rotate(180deg); }
  .hist-detail { display:none; padding:2px 4px 4px; }
  .hist-wrap.open .hist-detail { display:block; animation:fade .2s ease; }
  .hd-cat { font-size:11px; font-weight:800; color:var(--muted); text-transform:uppercase; letter-spacing:.6px; margin:12px 2px 6px; }
  .hd-line { display:flex; justify-content:space-between; font-size:14px; padding:6px 2px; border-bottom:1px solid var(--line); }
  .hd-line:last-child { border-bottom:none; }
  .hd-name { font-weight:600; }
  .hd-qty { color:var(--muted); font-weight:600; }
  .hd-sum { font-weight:800; color:var(--accent); margin-left:auto; padding-left:12px; }
  .hist-wrap { display:flex; flex-direction:column; gap:0; }
  .hist-wrap.open .hist-item { border-radius:16px 16px 0 0; }
  .hist-wrap.open .hist-detail { background:var(--card); border-radius:0 0 16px 16px; box-shadow:var(--shadow); margin-top:-2px; padding:2px 16px 14px; }

  .backup-row { display:flex; gap:10px; margin-bottom:14px; }
  .backup-row button { flex:1; border:none; border-radius:13px; padding:13px; font-size:14px; font-weight:700; cursor:pointer; font-family:inherit; transition:.12s; }
  .backup-row button:active { transform:scale(.98); }
  .bk-save { background:var(--green); color:#fff; }
  .bk-load { background:var(--card); color:var(--ink); box-shadow:var(--shadow); }

  /* Монитор */
  .mon-period-card { border-radius:20px; padding:20px 22px; margin-bottom:14px; box-shadow:var(--shadow); }
  .mon-exp { background:linear-gradient(160deg,#2b2520,#3a322a); color:#fff; }
  .mon-pl { font-size:12px; color:#b8ab98; text-transform:uppercase; letter-spacing:1.2px; font-weight:700; }
  .mon-pv { font-size:34px; font-weight:800; margin-top:4px; letter-spacing:-1px; }
  .mon-pv span { font-size:18px; font-weight:600; color:#d8a06f; margin-left:3px; }
  .mon-ps { font-size:13px; color:#b8ab98; margin-top:5px; font-weight:500; }
  .mon-seg { display:flex; gap:4px; background:var(--bg2); border-radius:13px; padding:4px; margin-bottom:14px; }
  .mon-seg button { flex:1; background:transparent; border:none; color:var(--muted); font-size:13px; font-weight:700; padding:9px 4px; border-radius:10px; cursor:pointer; font-family:inherit; transition:.15s; }
  .mon-seg button.active { background:var(--card); color:var(--ink); box-shadow:var(--shadow); }
  .mon-chart { display:flex; align-items:flex-end; gap:10px; height:170px; padding-top:10px; }
  .mc-col { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:flex-end; height:100%; gap:6px; min-width:0; }
  .mc-bar-val { font-size:11px; font-weight:700; color:var(--ink); white-space:nowrap; }
  .mc-bar2 { width:100%; max-width:46px; background:linear-gradient(180deg,#e07b3a,#c8541e); border-radius:8px 8px 0 0; min-height:4px; transition:height .5s ease; }
  .mc-lab { font-size:11px; color:var(--muted); font-weight:600; }
  .bubble-area { display:flex; align-items:center; justify-content:center; gap:10px; flex-wrap:wrap; min-height:120px; padding:10px 0; }
  .bubble { border-radius:50%; display:flex; align-items:center; justify-content:center; color:#fff; font-size:26px; flex-shrink:0; box-shadow:0 6px 16px rgba(0,0,0,.12); }
  .bub-legend-row { display:flex; align-items:center; gap:10px; padding:12px 2px; border-bottom:1px solid var(--line); }
  .bub-legend-row:last-child { border-bottom:none; }
  .bub-dot { width:12px; height:12px; border-radius:50%; flex-shrink:0; }
  .bub-name { font-weight:700; font-size:15px; }
  .bub-pct { color:var(--muted); font-weight:600; font-size:13px; margin-left:4px; }
  .bub-val { margin-left:auto; font-weight:800; font-size:15px; }

  /* Планы */
  .plan-card { background:linear-gradient(160deg,#2b3a4a,#28323f); color:#fff; border-radius:20px; padding:20px 22px; margin-bottom:16px; box-shadow:var(--shadow); }
  .plan-l { font-size:12px; color:#9db3c4; text-transform:uppercase; letter-spacing:1.2px; font-weight:700; }
  .plan-v { font-size:30px; font-weight:800; margin-top:4px; letter-spacing:-0.5px; }
  .plan-s { font-size:13px; color:#9db3c4; margin-top:5px; font-weight:500; }
  .plan-tobuy { margin-top:14px; width:100%; background:rgba(255,255,255,.16); color:#fff; border:none; border-radius:12px; padding:12px; font-size:14px; font-weight:700; cursor:pointer; font-family:inherit; transition:.15s; }
  .plan-tobuy:active { background:rgba(255,255,255,.3); }
  .plan-tabs { display:flex; gap:4px; background:var(--bg2); border-radius:12px; padding:4px; margin-bottom:13px; }
  .plan-tabs button { flex:1; background:transparent; border:none; color:var(--muted); font-size:14px; font-weight:700; padding:10px; border-radius:9px; cursor:pointer; font-family:inherit; transition:.15s; }
  .plan-tabs button.active { background:var(--card); color:var(--ink); box-shadow:var(--shadow); }
  #planSelect, #planNoteInput, #planQty { width:100%; background:var(--bg); border:1.5px solid transparent; border-radius:12px; color:var(--ink); font-size:16px; padding:13px 15px; outline:none; font-family:inherit; }
  #planSelect:focus, #planNoteInput:focus, #planQty:focus { border-color:var(--accent); background:#fff; }
  #planNoteInput { margin-bottom:10px; }
  .plan-item { background:var(--card); border-radius:14px; padding:13px 16px; display:flex; align-items:center; gap:11px; box-shadow:var(--shadow); }
  .plan-item.note { border-left:4px solid var(--blue); }
  .plan-ic { font-size:18px; flex-shrink:0; }
  .plan-info { flex:1; min-width:0; }
  .plan-name { font-size:15px; font-weight:700; }
  .plan-meta { font-size:13px; color:var(--muted); font-weight:600; margin-top:2px; }
  .plan-sum { font-weight:800; color:var(--accent); font-size:14px; white-space:nowrap; }
  .plan-del { border:none; background:var(--soft); color:var(--red); width:32px; height:32px; border-radius:9px; font-size:16px; cursor:pointer; flex-shrink:0; }
  .plan-del:active { transform:scale(.88); }
  .plan-day-sep { font-size:12px; font-weight:800; color:var(--muted); text-transform:uppercase; letter-spacing:.6px; margin:14px 3px 8px; }

  .modal-bg { position:fixed; inset:0; background:rgba(43,37,32,.5); display:none; align-items:center; justify-content:center; padding:30px; z-index:50; }
  .modal-bg.show { display:flex; }
  .modal { background:var(--card); border-radius:20px; padding:22px; max-width:340px; width:100%; box-shadow:0 20px 50px rgba(0,0,0,.3); }
  .modal h3 { font-size:18px; font-weight:800; margin-bottom:8px; }
  .modal p { font-size:14px; color:var(--muted); margin-bottom:18px; line-height:1.4; font-weight:500; }
  .modal-btns { display:flex; gap:10px; }
  .modal-btns button { flex:1; border:none; border-radius:12px; padding:13px; font-size:15px; font-weight:700; cursor:pointer; font-family:inherit; }
  .mb-cancel { background:var(--bg2); color:var(--ink); }
  .mb-ok { background:var(--red); color:#fff; }

  /* Управление разделами */
  .sec-row { display:flex; align-items:flex-end; gap:10px; }
  .manage-sec { background:var(--bg2); border:none; color:var(--ink); font-size:13px; font-weight:700; padding:13px 12px; border-radius:12px; cursor:pointer; font-family:inherit; white-space:nowrap; margin-bottom:11px; }
  .manage-sec:active { transform:scale(.97); }
  .sec-modal { max-width:380px; }
  .sec-list { display:flex; flex-direction:column; gap:8px; margin-bottom:16px; max-height:46vh; overflow-y:auto; }
  .sec-item { display:flex; align-items:center; gap:10px; background:var(--bg); border-radius:12px; padding:10px 12px; }
  .sec-item .ic { font-size:20px; }
  .sec-item .nm { font-weight:700; flex:1; }
  .sec-item .cnt { font-size:12px; color:var(--muted); font-weight:600; }
  .sec-del { border:none; background:var(--soft); color:var(--red); width:32px; height:32px; border-radius:9px; font-size:16px; cursor:pointer; flex-shrink:0; }
  .sec-add-form { border-top:1px solid var(--line); padding-top:14px; }
  .sec-add-row { display:flex; gap:8px; margin-bottom:10px; }
  .sec-icon-inp { width:56px; text-align:center; font-size:20px; background:var(--bg); border:1.5px solid transparent; border-radius:11px; padding:11px 4px; outline:none; font-family:inherit; }
  .sec-name-inp { flex:1; background:var(--bg); border:1.5px solid transparent; border-radius:11px; padding:11px 14px; font-size:16px; outline:none; font-family:inherit; color:var(--ink); }
  .sec-icon-inp:focus, .sec-name-inp:focus { border-color:var(--accent); background:#fff; }
  .sec-colors { display:flex; gap:7px; flex-wrap:wrap; margin-bottom:12px; }
  .sec-col { width:30px; height:30px; border-radius:9px; cursor:pointer; border:3px solid transparent; transition:.12s; }
  .sec-col.sel { border-color:var(--ink); transform:scale(1.1); }
  .sec-add-btn { width:100%; background:var(--accent); color:#fff; border:none; border-radius:12px; padding:13px; font-size:15px; font-weight:800; cursor:pointer; font-family:inherit; }
  .sec-add-btn:active { transform:scale(.98); }
</style>
</head>
<body>
  <header>
    <div class="title-row">
      <div class="basket">🧺</div>
      <div><h1>Закупка на базаре</h1><span class="date" id="today"></span></div>
    </div>
  </header>

  <div class="tabs">
    <button id="tabBuy" class="active">Базар</button>
    <button id="tabPlan">Планы</button>
    <button id="tabCat">Каталог</button>
    <button id="tabHist">История</button>
    <button id="tabMon">Монитор</button>
  </div>

  <div class="panel active" id="panelBuy">
    <div class="total-card">
      <div class="total-label">Итого за базар</div>
      <div class="total-value" id="total">0 <small>сум</small></div>
      <div class="total-meta" id="meta"></div>
      <div id="compareWrap"></div>
      <button class="save-bazar" id="saveBazarBtn">💾 Сохранить базар в историю</button>
    </div>
    <div id="buyGroups"></div>
    <div class="actions">
      <button id="copyBtn">📋 Скопировать</button>
      <button class="clear" id="resetBtn">↺ Сбросить</button>
    </div>
  </div>

  <div class="panel" id="panelCat">
    <div class="add-form">
      <div class="sec-row">
        <div style="flex:1"><div class="field-label">Раздел</div>
        <select id="cat"></select></div>
        <button class="manage-sec" id="manageSecBtn" type="button">⚙️ Разделы</button>
      </div>
      <div class="field-label">Название</div>
      <input type="text" id="name" placeholder="Помидоры, мука, масло...">
      <div class="row2">
        <div><div class="field-label">Цена</div><input type="number" id="price" placeholder="3 500" inputmode="decimal"></div>
        <div><div class="field-label">Единица</div><input type="text" id="unit" placeholder="кг" value="шт"></div>
      </div>
      <button class="add" id="addBtn">Добавить в каталог</button>
      <button class="cancel-edit" id="cancelEditBtn" style="display:none">Отменить редактирование</button>
    </div>
    <div class="search-box"><span class="search-ic">🔍</span><input type="text" id="searchInput" placeholder="Поиск по каталогу..."><button class="search-clear" id="searchClear" style="display:none">×</button></div>
    <div id="catGroups"></div>
  </div>

  <div class="panel" id="panelHist">
    <div class="hist-total"><div class="l">Всего за всё время</div><div class="v" id="histTotal">0 сум</div><div class="sub" id="histSub"></div><div id="donutWrap"></div></div>
    <div class="backup-row">
      <button class="bk-save" id="bkSaveBtn">⬇️ Сохранить копию</button>
      <button class="bk-load" id="bkLoadBtn">⬆️ Загрузить копию</button>
    </div>
    <input type="file" id="bkFile" accept="application/json,.json" style="display:none">
    <div id="analyticsWrap"></div>
    <div class="list" id="histList"></div>
  </div>

  <div class="panel" id="panelMon">
    <div class="mon-head">
      <div class="mon-period-card mon-exp">
        <div class="mon-pl">Расходы за период</div>
        <div class="mon-pv" id="monTotal">0 <span>сум</span></div>
        <div class="mon-ps" id="monSub"></div>
      </div>
    </div>
    <div class="mon-seg" id="monSeg">
      <button data-mp="3" class="active">3 мес</button>
      <button data-mp="6">6 мес</button>
      <button data-mp="12">Год</button>
      <button data-mp="0">Всё</button>
    </div>
    <div class="analytics">
      <h4>📊 Расходы по месяцам</h4>
      <div class="mon-chart" id="monChart"></div>
    </div>
    <div class="analytics">
      <h4>🫧 Расходы по разделам</h4>
      <div class="bubble-area" id="bubbleArea"></div>
      <div id="bubbleLegend"></div>
    </div>
  </div>

  <div class="panel" id="panelPlan">
    <div class="plan-card">
      <div class="plan-l">📝 План на следующий базар</div>
      <div class="plan-v" id="planTotal">—</div>
      <div class="plan-s" id="planSub">Запиши, что нужно купить</div>
      <button class="plan-tobuy" id="planToBuyBtn">🧺 Перенести в Базар</button>
    </div>

    <div class="add-form">
      <div class="plan-tabs" id="planMode">
        <button data-pm="cat" class="active">Из каталога</button>
        <button data-pm="note">Заметка</button>
      </div>
      <div id="planCatMode">
        <select id="planSelect"></select>
        <div class="row2" style="margin-top:10px">
          <div style="flex:2"><input type="number" id="planQty" placeholder="Сколько" inputmode="decimal" value="1"></div>
          <button class="add" id="planAddCat" style="flex:1;margin-top:0">Добавить</button>
        </div>
      </div>
      <div id="planNoteMode" style="display:none">
        <input type="text" id="planNoteInput" placeholder="Напр.: спросить цену на сахар">
        <button class="add" id="planAddNote" style="margin-top:0">Добавить заметку</button>
      </div>
    </div>

    <div class="list" id="planList"></div>
    <div class="actions" id="planActions" style="display:none">
      <button id="planCopyBtn">📋 Скопировать</button>
      <button class="clear" id="planClearBtn">🗑 Очистить план</button>
    </div>
  </div>

  <div class="modal-bg" id="modalBg">
    <div class="modal">
      <h3 id="modalTitle">Удалить?</h3>
      <p id="modalText"></p>
      <div class="modal-btns">
        <button class="mb-cancel" id="modalCancel">Отмена</button>
        <button class="mb-ok" id="modalOk">Удалить</button>
      </div>
    </div>
  </div>

  <div class="modal-bg" id="secModalBg">
    <div class="modal sec-modal">
      <h3>⚙️ Разделы</h3>
      <div class="sec-list" id="secList"></div>
      <div class="sec-add-form">
        <div class="sec-add-row">
          <input type="text" id="secIcon" class="sec-icon-inp" placeholder="🛒" maxlength="2">
          <input type="text" id="secName" class="sec-name-inp" placeholder="Название раздела">
        </div>
        <div class="sec-colors" id="secColors"></div>
        <button class="sec-add-btn" id="secAddBtn">Добавить раздел</button>
      </div>
      <button class="mb-cancel" id="secClose" style="width:100%;margin-top:6px">Готово</button>
    </div>
  </div>

<script>
  const KEY='bazar_catalog_v3', QKEY='bazar_qty_v3', HKEY='bazar_hist_v3', SKEY='bazar_sections_v1', PKEY='bazar_plan_v1';
  const PALETTE=['#3f8f5b','#8a6d3b','#2f6fb0','#c8541e','#8e44ad','#16a085','#d35400','#c0392b','#2c3e50','#e67e22'];
  // разделы по умолчанию
  const DEFAULT_SECTIONS=[{name:'Продукты',icon:'🛒',color:'#3f8f5b'},{name:'Сигареты',icon:'🚬',color:'#8a6d3b'},{name:'Напитки',icon:'🥤',color:'#2f6fb0'}];
  let sections=[];
  try { sections=JSON.parse(localStorage.getItem(SKEY))||[]; } catch(e){}
  if(!Array.isArray(sections)||sections.length===0) sections=DEFAULT_SECTIONS.map(s=>({...s}));
  function saveSections(){ try{localStorage.setItem(SKEY,JSON.stringify(sections));}catch(e){} }
  // динамические геттеры взамен старых констант
  function CATS_LIST(){ return sections.map(s=>s.name); }
  function META(cat){ const s=sections.find(x=>x.name===cat); return s?{icon:s.icon,color:s.color}:{icon:'📦',color:'#888'}; }

  let catalog=[], qty={}, hist=[], plan=[], editId=null, pendingAction=null;

  try { catalog=JSON.parse(localStorage.getItem(KEY))||[]; } catch(e){}
  try { qty=JSON.parse(localStorage.getItem(QKEY))||{}; } catch(e){}
  try { hist=JSON.parse(localStorage.getItem(HKEY))||[]; } catch(e){}
  try { plan=JSON.parse(localStorage.getItem(PKEY))||[]; } catch(e){}
  // миграция: товары без раздела или с разделом, которого нет — кидаем в первый
  const firstSec=()=>sections[0]?sections[0].name:'Продукты';
  catalog.forEach(it=>{
    if(!it.cat||!sections.find(s=>s.name===it.cat))it.cat=firstSec();
    if(!it.priceHist){ it.priceHist=[{p:it.price,d:new Date().toISOString()}]; }
  });

  const $=id=>document.getElementById(id);
  const fmt=n=>Number(n).toLocaleString('ru-RU');
  function saveCat(){ try{localStorage.setItem(KEY,JSON.stringify(catalog));}catch(e){} }
  function saveQty(){ try{localStorage.setItem(QKEY,JSON.stringify(qty));}catch(e){} }
  function saveHist(){ try{localStorage.setItem(HKEY,JSON.stringify(hist));}catch(e){} }
  function savePlan(){ try{localStorage.setItem(PKEY,JSON.stringify(plan));}catch(e){} }
  function esc(s){ return String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
  function total(){ return catalog.reduce((s,it)=>s+it.price*(qty[it.id]||0),0); }
  function plural(n){ return n===1?'товар':(n%10>=2&&n%10<=4&&(n%100<10||n%100>=20))?'товара':'товаров'; }
  function pluralBaz(n){ return n===1?'базар':(n%10>=2&&n%10<=4&&(n%100<10||n%100>=20))?'базара':'базаров'; }

  // записывает изменение цены в историю товара
  function recordPrice(it,newPrice){
    if(!it.priceHist)it.priceHist=[];
    const last=it.priceHist[it.priceHist.length-1];
    if(last&&last.p===newPrice)return; // цена не изменилась
    it.priceHist.push({p:newPrice,d:new Date().toISOString()});
    if(it.priceHist.length>30)it.priceHist=it.priceHist.slice(-30);
  }

  function modal(title,text,okLabel,fn,hideCancel){
    $('modalTitle').textContent=title; $('modalText').textContent=text;
    $('modalOk').textContent=okLabel||'Удалить'; $('modalOk').style.display=''; $('modalCancel').textContent='Отмена';
    pendingAction=fn;
    $('modalCancel').style.display=hideCancel?'none':''; $('modalBg').classList.add('show');
  }
  function closeModal(){ $('modalBg').classList.remove('show'); pendingAction=null; $('modalCancel').style.display=''; $('modalOk').style.display=''; $('modalCancel').textContent='Отмена'; }
  $('modalCancel').addEventListener('click',closeModal);
  $('modalBg').addEventListener('click',e=>{ if(e.target===$('modalBg'))closeModal(); });
  $('modalOk').addEventListener('click',()=>{ if(pendingAction)pendingAction(); closeModal(); });

  function renderCompare(){
    const wrap=$('compareWrap'); const t=total();
    if(!hist.length||t<=0){ wrap.innerHTML=''; return; }
    const last=hist[hist.length-1].total;
    if(last<=0){ wrap.innerHTML=''; return; }
    const diff=t-last, pct=Math.round(diff/last*100);
    let cls,txt;
    if(Math.abs(pct)<1){ cls='same'; txt=`≈ как прошлый базар (${fmt(last)})`; }
    else if(diff>0){ cls='up'; txt=`▲ +${fmt(diff)} (+${pct}%) к прошлому`; }
    else { cls='down'; txt=`▼ ${fmt(diff)} (${pct}%) к прошлому`; }
    wrap.innerHTML=`<div class="compare ${cls}">${txt}</div>`;
  }

  function renderTotal(){
    $('total').innerHTML=`${fmt(total())} <small>сум</small>`;
    const c=catalog.filter(it=>(qty[it.id]||0)>0).length;
    $('meta').textContent=c?`${c} ${plural(c)} в закупке`:'Введи количество товаров ниже';
    renderCompare();
  }

  function renderBuy(){
    const wrap=$('buyGroups');
    if(catalog.length===0){ wrap.innerHTML='<div class="empty">Каталог пуст 🤷<br>Открой «Каталог» и добавь товары с ценами.</div>'; renderTotal(); return; }
    let html='';
    CATS_LIST().forEach(cat=>{
      const items=catalog.filter(it=>it.cat===cat);
      if(!items.length)return;
      const m=META(cat);
      html+=`<div class="cat-group-label"><span class="dot" style="background:${m.color}"></span>${m.icon} ${cat}</div><div class="list">`;
      html+=items.map(it=>{
        const q=qty[it.id]||0, sum=it.price*q;
        return `<div class="buy-item ${q>0?'has':''}" data-card="${it.id}">
          <div class="buy-info"><div class="buy-name">${esc(it.name)}</div>
          <div class="buy-price" data-priceedit="${it.id}">${fmt(it.price)} сум / ${esc(it.unit||'шт')} <span class="pen">✎</span></div>
          ${q>0?`<div class="buy-sum">= ${fmt(sum)} сум</div>`:''}</div>
          <div class="stepper">
            <button data-act="minus" data-id="${it.id}">−</button>
            <input type="number" inputmode="decimal" data-id="${it.id}" value="${q||''}" placeholder="0">
            <button data-act="plus" data-id="${it.id}">+</button>
          </div></div>`;
      }).join('');
      html+='</div>';
    });
    wrap.innerHTML=html; renderTotal();
  }

  let searchQuery='';
  function renderCat(){
    const wrap=$('catGroups');
    if(catalog.length===0){ wrap.innerHTML='<div class="empty">Пока нет товаров.<br>Добавь первый выше ↑</div>'; return; }
    const q=searchQuery.trim().toLowerCase();
    let html='', found=0;
    CATS_LIST().forEach(cat=>{
      let items=catalog.filter(it=>it.cat===cat);
      if(q)items=items.filter(it=>it.name.toLowerCase().includes(q));
      if(!items.length)return;
      found+=items.length;
      const m=META(cat);
      html+=`<div class="cat-group-label"><span class="dot" style="background:${m.color}"></span>${m.icon} ${cat}</div><div class="list">`;
      html+=items.map(it=>{
        // индикатор изменения цены относительно предыдущей
        let trend='';
        if(it.priceHist&&it.priceHist.length>=2){
          const prev=it.priceHist[it.priceHist.length-2].p, cur=it.price;
          if(cur>prev)trend=' <span style="color:var(--red);font-weight:700">▲</span>';
          else if(cur<prev)trend=' <span style="color:var(--green);font-weight:700">▼</span>';
        }
        const hasHist=it.priceHist&&it.priceHist.length>=2;
        return `<div class="cat-item">
          <div class="cat-info"><div class="cat-name">${esc(it.name)}</div>
          <div class="cat-price">${fmt(it.price)} сум / ${esc(it.unit||'шт')}${trend}</div></div>
          ${hasHist?`<button class="icon-btn hist-btn" data-pricehist="${it.id}">📈</button>`:''}
          <button class="icon-btn edit-btn" data-edit="${it.id}">✎</button>
          <button class="icon-btn del-btn" data-del="${it.id}">×</button></div>`;
      }).join('');
      html+='</div>';
    });
    if(q&&found===0)html='<div class="empty">Ничего не найдено 🔍<br>Попробуй другое название.</div>';
    wrap.innerHTML=html;
  }

  function renderAnalytics(){
    const wrap=$('analyticsWrap');
    if(!hist.length){ wrap.innerHTML=''; return; }
    // расходы по разделам за всё время
    const byCat={}; CATS_LIST().forEach(c=>byCat[c]=0);
    hist.forEach(h=>(h.items||[]).forEach(it=>{ byCat[it.cat]=(byCat[it.cat]||0)+it.price*it.qty; }));
    const grand=Object.values(byCat).reduce((a,b)=>a+b,0)||1;
    let bars='';
    CATS_LIST().forEach(cat=>{
      const v=byCat[cat]||0; if(v===0)return;
      const pct=Math.round(v/grand*100); const m=META(cat);
      bars+=`<div class="bar-row"><div class="bar-head">
        <div class="bar-name">${m.icon} ${cat}</div>
        <div class="bar-val">${fmt(v)}<span class="bar-pct">${pct}%</span></div></div>
        <div class="bar-track"><div class="bar-fill" style="width:${pct}%;background:${m.color}"></div></div></div>`;
    });
    // график последних базаров
    const recent=hist.slice(-7);
    const max=Math.max(...recent.map(h=>h.total),1);
    let cols='';
    recent.forEach(h=>{
      const d=new Date(h.date); const hpct=Math.round(h.total/max*100);
      cols+=`<div class="chart-col"><div class="mc-bar" style="height:${Math.max(hpct,4)}%"></div><div class="mc-label">${d.getDate()}.${d.getMonth()+1}</div></div>`;
    });
    wrap.innerHTML=`
      <div class="analytics"><h4>📊 Расходы по разделам</h4>${bars}</div>
      <div class="analytics"><h4>📈 Последние базары</h4><div class="chart-wrap">${cols}</div></div>`;
  }

  function renderDonut(){
    const wrap=$('donutWrap');
    if(!hist.length){ wrap.innerHTML=''; return; }
    const byCat={}; CATS_LIST().forEach(c=>byCat[c]=0);
    hist.forEach(h=>(h.items||[]).forEach(it=>{ byCat[it.cat]=(byCat[it.cat]||0)+it.price*it.qty; }));
    const grand=Object.values(byCat).reduce((a,b)=>a+b,0);
    if(grand<=0){ wrap.innerHTML=''; return; }
    let acc=0, segs=[], legend='';
    CATS_LIST().forEach(cat=>{
      const v=byCat[cat]||0; if(v===0)return;
      const pct=v/grand*100, m=META(cat);
      segs.push(`${m.color} ${acc}% ${acc+pct}%`); acc+=pct;
      legend+=`<div class="leg-row"><span class="leg-dot" style="background:${m.color}"></span>
        <span class="leg-name">${m.icon} ${cat}</span>
        <span class="leg-val">${fmt(v)}<span class="leg-pct">${Math.round(pct)}%</span></span></div>`;
    });
    wrap.innerHTML=`<div class="donut-area">
      <div class="donut" style="background:conic-gradient(${segs.join(',')})"></div>
      <div class="donut-legend">${legend}</div></div>`;
  }

  function renderHist(){
    const list=$('histList');
    const sum=hist.reduce((s,h)=>s+h.total,0);
    $('histTotal').textContent=fmt(sum)+' сум';
    $('histSub').textContent=hist.length?`${hist.length} ${pluralBaz(hist.length)} · в среднем ${fmt(Math.round(sum/hist.length))} сум`:'';
    renderDonut(); renderAnalytics();
    if(!hist.length){ list.innerHTML='<div class="empty">Пока нет сохранённых базаров.<br>Собери закупку и нажми «Сохранить базар».</div>'; return; }
    const MON=['янв','фев','мар','апр','мая','июн','июл','авг','сен','окт','ноя','дек'];
    list.innerHTML=hist.slice().reverse().map(h=>{
      const d=new Date(h.date);
      // детализация товаров по разделам
      let detail='';
      CATS_LIST().forEach(cat=>{
        const items=(h.items||[]).filter(it=>it.cat===cat);
        if(!items.length)return;
        const m=META(cat);
        detail+=`<div class="hd-cat">${m.icon} ${cat}</div>`;
        detail+=items.map(it=>`<div class="hd-line"><span class="hd-name">${esc(it.name)}</span>
          <span class="hd-qty">${fmt(it.price)}×${it.qty}</span>
          <span class="hd-sum">${fmt(it.price*it.qty)}</span></div>`).join('');
      });
      return `<div class="hist-wrap" data-hwrap="${h.id}">
        <div class="hist-item" data-htoggle="${h.id}">
          <div class="hist-date-box"><div class="hist-day">${d.getDate()}</div><div class="hist-mon">${MON[d.getMonth()]}</div></div>
          <div class="hist-info"><div class="hist-sum">${fmt(h.total)} сум</div>
          <div class="hist-cnt">${h.count} ${plural(h.count)} · ${d.toLocaleDateString('ru-RU',{weekday:'short'})} <span class="hist-chev">▼</span></div></div>
          <button class="icon-btn del-btn" data-hdel="${h.id}">×</button>
        </div>
        <div class="hist-detail">${detail||'<div class="hd-line">Нет данных по товарам</div>'}</div>
      </div>`;
    }).join('');
  }

  // история цен товара (через модалку)
  function showPriceHist(it){
    const MON=['янв','фев','мар','апр','мая','июн','июл','авг','сен','окт','ноя','дек'];
    const ph=(it.priceHist||[]).slice().reverse();
    let rows='';
    ph.forEach((rec,i)=>{
      const d=new Date(rec.d);
      const older=ph[i+1];
      let diff='';
      if(older){
        const dv=rec.p-older.p, pct=Math.round(dv/older.p*100);
        if(dv>0)diff=`<span class="ph-diff up">+${fmt(dv)} (+${pct}%)</span>`;
        else if(dv<0)diff=`<span class="ph-diff down">${fmt(dv)} (${pct}%)</span>`;
        else diff=`<span class="ph-diff same">без изм.</span>`;
      } else diff=`<span class="ph-diff same">старт</span>`;
      rows+=`<div class="ph-row"><span class="ph-date">${d.getDate()} ${MON[d.getMonth()]} ${String(d.getFullYear()).slice(2)}</span>
        <span class="ph-price">${fmt(rec.p)} сум</span>${diff}</div>`;
    });
    $('modalTitle').textContent='📈 '+it.name;
    $('modalText').innerHTML=`<div class="pricehist-list">${rows}</div>`;
    $('modalOk').style.display='none'; $('modalCancel').textContent='Закрыть';
    pendingAction=null; $('modalBg').classList.add('show');
  }

  // поиск по каталогу
  $('searchInput').addEventListener('input',e=>{
    searchQuery=e.target.value;
    $('searchClear').style.display=searchQuery?'block':'none';
    renderCat();
  });
  $('searchClear').addEventListener('click',()=>{
    searchQuery=''; $('searchInput').value=''; $('searchClear').style.display='none'; renderCat(); $('searchInput').focus();
  });

  function startEdit(it){
    editId=it.id;
    $('cat').value=it.cat; $('name').value=it.name; $('price').value=it.price; $('unit').value=it.unit||'шт';
    $('addBtn').textContent='Сохранить изменения'; $('addBtn').classList.add('editing');
    $('cancelEditBtn').style.display='block';
    $('name').scrollIntoView({behavior:'smooth',block:'center'}); $('name').focus();
  }
  function endEdit(){
    editId=null; $('name').value=''; $('price').value=''; $('unit').value='шт';
    $('addBtn').textContent='Добавить в каталог'; $('addBtn').classList.remove('editing');
    $('cancelEditBtn').style.display='none';
  }
  $('cancelEditBtn').addEventListener('click',endEdit);

  function submitProduct(){
    const name=$('name').value.trim(), price=parseFloat($('price').value), unit=$('unit').value.trim()||'шт', cat=$('cat').value;
    if(!name){ $('name').focus(); return; }
    if(isNaN(price)||price<=0){ $('price').focus(); return; }
    if(editId){
      const it=catalog.find(c=>c.id===editId);
      if(it){ if(it.price!==price)recordPrice(it,price); it.name=name; it.price=price; it.unit=unit; it.cat=cat; }
      saveCat(); endEdit();
    } else {
      const it={id:Date.now()+''+Math.floor(Math.random()*999),name,price,unit,cat,priceHist:[]};
      recordPrice(it,price);
      catalog.push(it);
      saveCat(); $('name').value=''; $('price').value=''; $('unit').value='шт'; $('name').focus();
    }
    renderCat(); renderBuy();
  }
  $('addBtn').addEventListener('click',submitProduct);
  $('name').addEventListener('keydown',e=>{if(e.key==='Enter')$('price').focus();});
  $('price').addEventListener('keydown',e=>{if(e.key==='Enter')submitProduct();});

  $('catGroups').addEventListener('click',e=>{
    const ph=e.target.closest('[data-pricehist]');
    if(ph){ const it=catalog.find(c=>c.id===ph.dataset.pricehist); if(it)showPriceHist(it); return; }
    const ed=e.target.closest('[data-edit]'); const dl=e.target.closest('[data-del]');
    if(ed){ const it=catalog.find(c=>c.id===ed.dataset.edit); if(it)startEdit(it); return; }
    if(dl){ const it=catalog.find(c=>c.id===dl.dataset.del); if(!it)return;
      modal('Удалить товар?',`«${it.name}» будет удалён из каталога.`,'Удалить',()=>{
        catalog=catalog.filter(c=>c.id!==dl.dataset.del); delete qty[dl.dataset.del];
        saveCat(); saveQty(); renderCat(); renderBuy();
      });
    }
  });

  // Быстрое изменение цены на базаре
  $('buyGroups').addEventListener('click',e=>{
    const pe=e.target.closest('[data-priceedit]');
    if(pe){
      const id=pe.dataset.priceedit; const it=catalog.find(c=>c.id===id); if(!it)return;
      if(pe.querySelector('input'))return;
      pe.innerHTML=`<div class="price-edit"><input type="number" inputmode="decimal" value="${it.price}"><button>OK</button></div>`;
      const inp=pe.querySelector('input'); inp.focus(); inp.select();
      const apply=()=>{ const v=parseFloat(inp.value); if(!isNaN(v)&&v>0){ if(it.price!==v)recordPrice(it,v); it.price=v; saveCat(); } renderBuy(); };
      pe.querySelector('button').addEventListener('click',ev=>{ ev.stopPropagation(); apply(); });
      inp.addEventListener('keydown',ev=>{ if(ev.key==='Enter')apply(); });
      inp.addEventListener('click',ev=>ev.stopPropagation());
      return;
    }
    const b=e.target.closest('button[data-act]'); if(!b)return;
    const id=b.dataset.id; let q=qty[id]||0;
    q=b.dataset.act==='plus'?q+1:Math.max(0,q-1);
    if(q===0)delete qty[id]; else qty[id]=q;
    saveQty(); renderBuy();
  });
  $('buyGroups').addEventListener('input',e=>{
    if(e.target.tagName!=='INPUT'||!e.target.dataset.id)return;
    const id=e.target.dataset.id, v=parseFloat(e.target.value);
    if(isNaN(v)||v<=0)delete qty[id]; else qty[id]=v;
    saveQty(); renderTotal();
    const card=e.target.closest('.buy-item'); if(card)card.classList.toggle('has',!!qty[id]);
    let s=card.querySelector('.buy-sum');
    if(qty[id]){ const t=`= ${fmt(catalog.find(c=>c.id===id).price*qty[id])} сум`; if(s)s.textContent=t; else { s=document.createElement('div'); s.className='buy-sum'; s.textContent=t; card.querySelector('.buy-info').appendChild(s);} }
    else if(s)s.remove();
  });

  $('resetBtn').addEventListener('click',()=>{
    if(Object.keys(qty).length) modal('Сбросить количества?','Все введённые количества обнулятся. Каталог и история останутся.','Сбросить',()=>{ qty={}; saveQty(); renderBuy(); });
  });

  $('saveBazarBtn').addEventListener('click',()=>{
    const t=total(), count=catalog.filter(it=>(qty[it.id]||0)>0).length;
    if(t<=0){ modal('Базар пустой','Сначала введи количество товаров, потом сохраняй.','Ок',null,true); return; }
    const items=catalog.filter(it=>(qty[it.id]||0)>0).map(it=>({name:it.name,price:it.price,qty:qty[it.id],cat:it.cat}));
    hist.push({id:Date.now()+'',date:new Date().toISOString(),total:t,count,items});
    saveHist();
    $('saveBazarBtn').textContent='✅ Сохранено в историю';
    setTimeout(()=>$('saveBazarBtn').textContent='💾 Сохранить базар в историю',1600);
    renderHist(); renderCompare();
  });

  $('histList').addEventListener('click',e=>{
    const d=e.target.closest('[data-hdel]');
    if(d){
      modal('Удалить запись?','Этот базар будет удалён из истории.','Удалить',()=>{
        hist=hist.filter(h=>h.id!==d.dataset.hdel); saveHist(); renderHist();
      });
      return;
    }
    const t=e.target.closest('[data-htoggle]'); if(!t)return;
    const wrap=t.closest('.hist-wrap'); if(wrap)wrap.classList.toggle('open');
  });

  // ===== Резервная копия =====
  $('bkSaveBtn').addEventListener('click',()=>{
    const data={ v:5, catalog, hist, sections, plan, savedAt:new Date().toISOString() };
    const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');
    const dt=new Date(); const stamp=`${dt.getFullYear()}-${String(dt.getMonth()+1).padStart(2,'0')}-${String(dt.getDate()).padStart(2,'0')}`;
    a.href=url; a.download=`bazar-kopiya-${stamp}.json`;
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    setTimeout(()=>URL.revokeObjectURL(url),1000);
    $('bkSaveBtn').textContent='✅ Файл готов';
    setTimeout(()=>$('bkSaveBtn').textContent='⬇️ Сохранить копию',1800);
  });
  $('bkLoadBtn').addEventListener('click',()=>$('bkFile').click());
  $('bkFile').addEventListener('change',e=>{
    const file=e.target.files[0]; if(!file)return;
    const reader=new FileReader();
    reader.onload=ev=>{
      try{
        const d=JSON.parse(ev.target.result);
        if(!d.catalog||!Array.isArray(d.catalog)) throw 0;
        modal('Загрузить копию?','Текущий каталог, история и разделы будут заменены данными из файла.','Загрузить',()=>{
          catalog=d.catalog; hist=Array.isArray(d.hist)?d.hist:[];
          if(Array.isArray(d.sections)&&d.sections.length){ sections=d.sections; saveSections(); }
          plan=Array.isArray(d.plan)?d.plan:[]; savePlan();
          const fb=sections[0]?sections[0].name:'Продукты';
          catalog.forEach(it=>{ if(!it.cat||!sections.find(s=>s.name===it.cat))it.cat=fb; if(!it.priceHist){ it.priceHist=[{p:it.price,d:new Date().toISOString()}]; } });
          qty={}; saveCat(); saveHist(); saveQty();
          fillCatSelect(); renderBuy(); renderCat(); renderHist();
        });
      }catch(err){ modal('Ошибка','Файл не подходит. Загрузи копию, сохранённую этим приложением.','Ок',null,true); }
      $('bkFile').value='';
    };
    reader.readAsText(file);
  });

  // ===== Монитор =====
  let monPeriod=3; // месяцев; 0 = всё время
  function renderMon(){
    const MON=['Янв','Фев','Мар','Апр','Май','Июн','Июл','Авг','Сен','Окт','Ноя','Дек'];
    // фильтр истории по периоду
    let items=hist.slice();
    if(monPeriod>0){
      const cutoff=new Date(); cutoff.setMonth(cutoff.getMonth()-monPeriod+1); cutoff.setDate(1); cutoff.setHours(0,0,0,0);
      items=items.filter(h=>new Date(h.date)>=cutoff);
    }
    // расходы по месяцам
    const byMonth={};
    items.forEach(h=>{ const d=new Date(h.date); const k=`${d.getFullYear()}-${d.getMonth()}`; byMonth[k]=(byMonth[k]||0)+h.total; });
    // построим список месяцев для отображения
    let months=[];
    if(monPeriod>0){
      const now=new Date();
      for(let i=monPeriod-1;i>=0;i--){ const d=new Date(now.getFullYear(),now.getMonth()-i,1); months.push({y:d.getFullYear(),m:d.getMonth()}); }
    } else {
      const keys=Object.keys(byMonth).sort();
      if(keys.length===0){ const now=new Date(); months.push({y:now.getFullYear(),m:now.getMonth()}); }
      else months=keys.map(k=>{ const[y,m]=k.split('-'); return {y:+y,m:+m}; });
    }
    const grandTotal=items.reduce((s,h)=>s+h.total,0);
    $('monTotal').innerHTML=`${fmt(grandTotal)} <span>сум</span>`;
    const labelTxt = monPeriod===0?'за всё время':monPeriod===12?'за год':`за ${monPeriod} мес`;
    $('monSub').textContent=`${items.length} ${pluralBaz(items.length)} ${labelTxt}`;

    // график
    const vals=months.map(mo=>byMonth[`${mo.y}-${mo.m}`]||0);
    const max=Math.max(...vals,1);
    let chart='';
    months.forEach((mo,i)=>{
      const v=vals[i]; const hpct=v>0?Math.max(Math.round(v/max*100),6):2;
      chart+=`<div class="mc-col">
        <div class="mc-bar-val">${v>0?fmt(v):''}</div>
        <div class="mc-bar2" style="height:${hpct}%"></div>
        <div class="mc-lab">${MON[mo.m]}</div></div>`;
    });
    $('monChart').innerHTML=chart;

    // пузыри по разделам
    const byCat={}; CATS_LIST().forEach(c=>byCat[c]=0);
    items.forEach(h=>(h.items||[]).forEach(it=>{ byCat[it.cat]=(byCat[it.cat]||0)+it.price*it.qty; }));
    const catGrand=Object.values(byCat).reduce((a,b)=>a+b,0);
    const present=CATS_LIST().filter(c=>byCat[c]>0).sort((a,b)=>byCat[b]-byCat[a]);
    if(catGrand<=0){
      $('bubbleArea').innerHTML='<div class="empty" style="padding:20px">Нет данных за период</div>';
      $('bubbleLegend').innerHTML='';
      return;
    }
    const maxCat=Math.max(...present.map(c=>byCat[c]));
    let bubbles='', legend='';
    present.forEach(cat=>{
      const v=byCat[cat], m=META(cat);
      const size=Math.round(56+ (v/maxCat)*72); // 56..128px
      bubbles+=`<div class="bubble" style="width:${size}px;height:${size}px;background:${m.color};font-size:${Math.round(size*0.32)}px">${m.icon}</div>`;
      const pct=(v/catGrand*100).toFixed(1).replace('.0','');
      legend+=`<div class="bub-legend-row"><span class="bub-dot" style="background:${m.color}"></span>
        <span class="bub-name">${m.icon} ${cat}<span class="bub-pct">${pct}%</span></span>
        <span class="bub-val">${fmt(v)} сум</span></div>`;
    });
    $('bubbleArea').innerHTML=bubbles;
    $('bubbleLegend').innerHTML=legend;
  }
  $('monSeg').addEventListener('click',e=>{
    const b=e.target.closest('button[data-mp]'); if(!b)return;
    monPeriod=+b.dataset.mp;
    [...$('monSeg').children].forEach(x=>x.classList.toggle('active',x===b));
    renderMon();
  });

  // ===== Планы на следующий базар =====
  let planMode='cat';
  function fillPlanSelect(){
    const sel=$('planSelect');
    if(catalog.length===0){ sel.innerHTML='<option value="">Каталог пуст — добавь товары</option>'; return; }
    let html='';
    CATS_LIST().forEach(cat=>{
      const items=catalog.filter(it=>it.cat===cat); if(!items.length)return;
      const m=META(cat);
      html+=`<optgroup label="${m.icon} ${esc(cat)}">`;
      html+=items.map(it=>`<option value="${it.id}">${esc(it.name)} — ${fmt(it.price)} сум</option>`).join('');
      html+='</optgroup>';
    });
    sel.innerHTML=html;
  }
  function planSum(){
    return plan.reduce((s,p)=>{ if(p.type==='cat'){ const it=catalog.find(c=>c.id===p.id); if(it)return s+it.price*p.qty; } return s; },0);
  }
  function renderPlan(){
    const list=$('planList');
    const catItems=plan.filter(p=>p.type==='cat'&&catalog.find(c=>c.id===p.id));
    const sum=planSum();
    if(sum>0){ $('planTotal').textContent=fmt(sum)+' сум'; }
    else { $('planTotal').textContent='—'; }
    const cnt=plan.length;
    $('planSub').textContent=cnt?`${cnt} ${cnt===1?'пункт':(cnt<5?'пункта':'пунктов')} в плане`:'Запиши, что нужно купить';
    $('planActions').style.display=cnt?'flex':'none';
    $('planToBuyBtn').style.display=catItems.length?'block':'none';

    if(!cnt){ list.innerHTML='<div class="empty">План пуст 📝<br>Добавь товары из каталога или напиши заметку.</div>'; return; }
    list.innerHTML=plan.map((p,i)=>{
      if(p.type==='cat'){
        const it=catalog.find(c=>c.id===p.id);
        if(!it)return '';
        const m=META(it.cat);
        return `<div class="plan-item"><span class="plan-ic">${m.icon}</span>
          <div class="plan-info"><div class="plan-name">${esc(it.name)}</div>
          <div class="plan-meta">${fmt(it.price)} × ${p.qty} ${esc(it.unit||'шт')}</div></div>
          <span class="plan-sum">${fmt(it.price*p.qty)}</span>
          <button class="plan-del" data-pdel="${i}">×</button></div>`;
      } else {
        return `<div class="plan-item note"><span class="plan-ic">📌</span>
          <div class="plan-info"><div class="plan-name">${esc(p.text)}</div></div>
          <button class="plan-del" data-pdel="${i}">×</button></div>`;
      }
    }).join('');
  }
  // переключение режима
  $('planMode').addEventListener('click',e=>{
    const b=e.target.closest('button[data-pm]'); if(!b)return;
    planMode=b.dataset.pm;
    [...$('planMode').children].forEach(x=>x.classList.toggle('active',x===b));
    $('planCatMode').style.display=planMode==='cat'?'block':'none';
    $('planNoteMode').style.display=planMode==='note'?'block':'none';
  });
  // добавить из каталога
  $('planAddCat').addEventListener('click',()=>{
    const id=$('planSelect').value; if(!id)return;
    const q=parseFloat($('planQty').value)||1;
    const ex=plan.find(p=>p.type==='cat'&&p.id===id);
    if(ex)ex.qty+=q; else plan.push({type:'cat',id,qty:q});
    savePlan(); renderPlan();
    $('planQty').value='1';
  });
  // добавить заметку
  function addNote(){
    const t=$('planNoteInput').value.trim(); if(!t)return;
    plan.push({type:'note',text:t}); savePlan(); renderPlan();
    $('planNoteInput').value=''; $('planNoteInput').focus();
  }
  $('planAddNote').addEventListener('click',addNote);
  $('planNoteInput').addEventListener('keydown',e=>{ if(e.key==='Enter')addNote(); });
  // удалить пункт
  $('planList').addEventListener('click',e=>{
    const d=e.target.closest('[data-pdel]'); if(!d)return;
    plan.splice(+d.dataset.pdel,1); savePlan(); renderPlan();
  });
  // перенести в базар
  $('planToBuyBtn').addEventListener('click',()=>{
    const catItems=plan.filter(p=>p.type==='cat'&&catalog.find(c=>c.id===p.id));
    if(!catItems.length)return;
    modal('Перенести в Базар?','Количества из плана добавятся к текущему базару. Заметки останутся в плане.','Перенести',()=>{
      catItems.forEach(p=>{ qty[p.id]=(qty[p.id]||0)+p.qty; });
      saveQty();
      // убираем перенесённые товарные пункты, заметки оставляем
      plan=plan.filter(p=>p.type!=='cat');
      savePlan(); renderPlan(); renderBuy();
      switchTab('Buy');
    });
  });
  // очистить план
  $('planClearBtn').addEventListener('click',()=>{
    if(plan.length) modal('Очистить план?','Весь список плана будет удалён.','Очистить',()=>{ plan=[]; savePlan(); renderPlan(); });
  });
  // копировать план
  $('planCopyBtn').addEventListener('click',()=>{
    const lines=plan.map(p=>{
      if(p.type==='cat'){ const it=catalog.find(c=>c.id===p.id); return it?`☐ ${it.name} × ${p.qty} ${it.unit||'шт'}`:''; }
      return `📌 ${p.text}`;
    }).filter(Boolean);
    if(!lines.length)return;
    const sum=planSum();
    const txt='ПЛАН НА БАЗАР:\n'+lines.join('\n')+(sum>0?`\n\nПримерно: ${fmt(sum)} сум`:'');
    navigator.clipboard.writeText(txt).then(()=>{ $('planCopyBtn').textContent='✅ Готово'; setTimeout(()=>$('planCopyBtn').textContent='📋 Скопировать',1500); });
  });

  function switchTab(t){
    ['Buy','Plan','Cat','Hist','Mon'].forEach(x=>{ $('tab'+x).classList.toggle('active',x===t); $('panel'+x).classList.toggle('active',x===t); });
    if(t==='Hist')renderHist();
    if(t==='Mon')renderMon();
    if(t==='Plan'){ fillPlanSelect(); renderPlan(); }
  }
  $('tabBuy').addEventListener('click',()=>switchTab('Buy'));
  $('tabPlan').addEventListener('click',()=>switchTab('Plan'));
  $('tabCat').addEventListener('click',()=>switchTab('Cat'));
  $('tabHist').addEventListener('click',()=>switchTab('Hist'));
  $('tabMon').addEventListener('click',()=>switchTab('Mon'));

  $('copyBtn').addEventListener('click',()=>{
    let out=[];
    CATS_LIST().forEach(cat=>{
      const lines=catalog.filter(it=>it.cat===cat&&(qty[it.id]||0)>0).map(it=>`${it.name} — ${fmt(it.price)}×${qty[it.id]} = ${fmt(it.price*qty[it.id])}`);
      if(lines.length){ out.push(`【${cat}】`); out=out.concat(lines); out.push(''); }
    });
    if(!out.length)return;
    const txt=out.join('\n')+`ИТОГО: ${fmt(total())} сум`;
    navigator.clipboard.writeText(txt).then(()=>{ $('copyBtn').textContent='✅ Готово'; setTimeout(()=>$('copyBtn').textContent='📋 Скопировать',1500); });
  });

  // ===== Разделы (секции) =====
  let pickedColor=PALETTE[0];
  function fillCatSelect(){
    const sel=$('cat'); const cur=sel.value;
    sel.innerHTML=sections.map(s=>`<option value="${esc(s.name)}">${s.icon} ${esc(s.name)}</option>`).join('');
    if(sections.find(s=>s.name===cur))sel.value=cur;
  }
  function renderSecList(){
    const list=$('secList');
    list.innerHTML=sections.map((s,i)=>{
      const cnt=catalog.filter(it=>it.cat===s.name).length;
      return `<div class="sec-item"><span class="ic">${s.icon}</span>
        <span class="nm">${esc(s.name)}</span>
        <span class="cnt">${cnt} тов.</span>
        <button class="sec-del" data-secdel="${i}">×</button></div>`;
    }).join('');
  }
  function renderColorPicker(){
    $('secColors').innerHTML=PALETTE.map(c=>`<div class="sec-col ${c===pickedColor?'sel':''}" data-col="${c}" style="background:${c}"></div>`).join('');
  }
  $('secColors').addEventListener('click',e=>{
    const c=e.target.closest('[data-col]'); if(!c)return;
    pickedColor=c.dataset.col; renderColorPicker();
  });
  function openSecModal(){
    pickedColor=PALETTE[0]; $('secName').value=''; $('secIcon').value='';
    renderSecList(); renderColorPicker(); $('secModalBg').classList.add('show');
  }
  $('manageSecBtn').addEventListener('click',openSecModal);
  $('secClose').addEventListener('click',()=>$('secModalBg').classList.remove('show'));
  $('secModalBg').addEventListener('click',e=>{ if(e.target===$('secModalBg'))$('secModalBg').classList.remove('show'); });

  $('secAddBtn').addEventListener('click',()=>{
    const name=$('secName').value.trim(), icon=$('secIcon').value.trim()||'📦';
    if(!name){ $('secName').focus(); return; }
    if(sections.find(s=>s.name.toLowerCase()===name.toLowerCase())){ $('secName').focus(); return; }
    sections.push({name,icon,color:pickedColor});
    saveSections();
    $('secName').value=''; $('secIcon').value=''; pickedColor=PALETTE[sections.length%PALETTE.length];
    renderSecList(); renderColorPicker(); fillCatSelect();
    renderBuy(); renderCat(); renderHist();
  });

  $('secList').addEventListener('click',e=>{
    const d=e.target.closest('[data-secdel]'); if(!d)return;
    const idx=+d.dataset.secdel; const s=sections[idx];
    const cnt=catalog.filter(it=>it.cat===s.name).length;
    if(sections.length<=1){ modal('Нельзя удалить','Должен остаться хотя бы один раздел.','Ок',null,true); return; }
    const txt=cnt>0?`В разделе «${s.name}» ${cnt} товаров. Они переедут в «${sections.find((x,i)=>i!==idx).name}».`:`Раздел «${s.name}» будет удалён.`;
    modal('Удалить раздел?',txt,'Удалить',()=>{
      const fallback=sections.find((x,i)=>i!==idx).name;
      catalog.forEach(it=>{ if(it.cat===s.name)it.cat=fallback; });
      sections.splice(idx,1);
      saveSections(); saveCat();
      renderSecList(); fillCatSelect(); renderBuy(); renderCat(); renderHist();
    });
  });

  fillCatSelect();
  $('today').textContent=new Date().toLocaleDateString('ru-RU',{day:'numeric',month:'long'});
  renderBuy(); renderCat(); renderHist();
</script>
</body>
</html>
